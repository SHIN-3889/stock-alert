<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출하 선석표</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif; background:#f4f6f9; color:#222; }
  .wrap { max-width:1000px; margin:0 auto; padding:14px; }
  .header { background:linear-gradient(135deg,#9a6700,#f39c12); color:#fff; border-radius:14px; padding:18px; margin-bottom:12px; }
  .header h1 { font-size:19px; margin-bottom:4px; }
  .header .sub { font-size:13px; opacity:.9; }
  .card { background:#fff; border-radius:12px; padding:16px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .card h2 { font-size:14px; margin-bottom:10px; color:#9a6700; }
  textarea { width:100%; border:1px solid #ccd6e0; border-radius:8px; padding:10px; font-size:12px; min-height:100px; resize:vertical; font-family:inherit; }
  .btn { border:none; border-radius:8px; padding:11px 16px; font-size:14px; font-weight:600; cursor:pointer; margin-top:8px; margin-right:6px; }
  .btn-orange { background:#f39c12; color:#fff; }
  .btn-blue { background:#2980b9; color:#fff; }
  .btn-gray { background:#e3e8ee; color:#444; }
  .title-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
  .title-input { font-size:18px; font-weight:700; border:1px solid #ccd6e0; border-radius:8px; padding:8px 12px; width:260px; }
  /* 화면용 표 */
  table.berth { width:100%; border-collapse:collapse; font-size:13px; table-layout:fixed; }
  table.berth th, table.berth td { border:1px solid #999; padding:11px 3px; text-align:center; word-break:keep-all; overflow-wrap:break-word; white-space:normal; vertical-align:middle; height:46px; overflow:hidden; }
  table.berth th { background:#eaf0f6; font-size:12px; }
  table.berth td.comp { background:#1a2c47; color:#fff; font-weight:700; font-size:11px; }
  table.berth input.cell { width:100%; border:none; background:transparent; text-align:center; font-size:13px; font-family:inherit; }
  table.berth td.ok-cell { cursor:pointer; font-weight:700; color:#1e8449; user-select:none; }
  table.berth td.nowrap, table.berth th.nowrap { white-space:nowrap !important; }
  table.berth td.cargo-cell { word-break:normal; overflow-wrap:normal; }
  .note-area { margin-top:10px; }
  .empty { color:#aaa; font-size:13px; text-align:center; padding:16px; }
  /* 인쇄 전용 영역은 평소 숨김 */
  #printArea { display:none; width:1059px; }
  @media print {
    @page { size:A4 landscape; margin:8mm; }
    body { background:#fff; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    body > .wrap { display:none !important; }
    #printArea { display:block !important; width:1059px !important; }
    #printArea table { page-break-inside:auto; }
    #printArea tr { page-break-inside:avoid; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header no-print"><h1>🚢 출하 선석표</h1><div class="sub">메일 선석표에서 YNCC 항차만 자동 추출 <span style="opacity:.7;font-size:11px;margin-left:6px;">v3.1</span></div></div>

  <div class="card no-print">
    <h2>📋 선석표 붙여넣기</h2>
    <div style="font-size:13px;color:#666;margin-bottom:8px;line-height:1.8;">
      ① 메일 첨부 엑셀을 열어요<br>
      ② 전체 선택 <b>Ctrl+A</b> → 복사 <b>Ctrl+C</b><br>
      ③ 아래 칸에 붙여넣기 <b>Ctrl+V</b> → 추출 버튼
    </div>
    <textarea id="pasteArea" placeholder="엑셀 내용을 붙여넣으세요 (Ctrl+V)"></textarea>
    <button class="btn btn-orange" onclick="parsePaste()">🚢 YNCC 항차 추출</button>
  </div>

  <div class="card" id="resultCard" style="display:none;">
    <div class="title-row">
      <input class="title-input" id="docTitle" value="">
      <button class="btn btn-blue no-print" onclick="doPrint()">🖨️ 인쇄</button>
      <button class="btn btn-gray no-print" onclick="clearDoc()">초기화</button>
    </div>
    <div id="tableWrap"></div>
    <div class="note-area">
      <div style="font-size:13px;font-weight:700;margin-bottom:4px;">*특이사항</div>
      <textarea id="noteArea" style="min-height:50px;" onchange="saveDoc()"></textarea>
    </div>
  </div>
</div>

<!-- 인쇄 전용 영역 -->
<div id="printArea"></div>

<script>
var DOC = null;

function todayTitle(){ var d=new Date(); return (d.getMonth()+1)+'월 '+d.getDate()+'일 선석표'; }
// [v3.1] 저장소를 쓰지 않음 — 메모리(DOC 변수)에만 유지.
// 새로고침/새 창/탭을 열면 이전 추출 내용이 보이지 않음.
function loadDoc(){ return null; }
function saveDoc(){
  if(!DOC)return;
  // 메모리에만 갱신 (저장소 사용 안 함 — 새로고침 시 사라짐)
  DOC.title=document.getElementById('docTitle').value;
  DOC.note=document.getElementById('noteArea').value;
}
function clearDoc(){
  if(!confirm('현재 선석표를 지울까요?'))return;
  DOC=null;
  document.getElementById('resultCard').style.display='none';
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function parseBerth(s){
  if(!s||!s.trim())return null;
  var m=String(s).replace(/[^0-9\/]/g,'').match(/^(\d+)\/(\d+)$/);
  if(!m)return null;
  return parseInt(m[1])*10000+Math.floor(parseInt(m[2])/100)*100+parseInt(m[2])%100;
}

function extractFromGrid(grid){
  var headerIdx=-1;
  for(var i=0;i<Math.min(grid.length,10);i++){
    if(grid[i].map(function(c){return String(c||'').toUpperCase();}).some(function(c){return c.indexOf('VESSEL')!==-1;})){headerIdx=i;break;}
  }
  if(headerIdx===-1)return null;
  var hdr=grid[headerIdx].map(function(c){return String(c||'');});
  function fc(kw){for(var j=0;j<hdr.length;j++)if(hdr[j].toUpperCase().indexOf(kw.toUpperCase())!==-1)return j; return -1;}
  var cm={comp:fc('회사'),vessel:fc('VESSEL'),eta:fc('입항'),berth:fc('접안'),etd:fc('이안'),
    cargo:fc('CARGO'),insp:fc('검정'),dest:fc('행선'),plant:fc('공장'),remark:fc('REMARK')};
  if(cm.comp===-1||cm.vessel===-1)return null;
  var rows=[];
  for(var r=headerIdx+1;r<grid.length;r++){
    var row=grid[r];
    var comp=String(row[cm.comp]||'').trim();
    if(comp.toUpperCase().indexOf('YNCC')===0){
      function g(k){return cm[k]!==-1?String(row[cm[k]]||'').trim():'';}
      rows.push({comp:comp,vessel:g('vessel'),eta:g('eta'),berth:g('berth'),etd:g('etd'),
        cargo:g('cargo'),insp:g('insp'),dest:g('dest'),plant:g('plant'),
        remark:g('remark'),anal:'',cert:'',tank1:'',tank2:'',tank3:''});
    }
  }
  return rows;
}

function applyRows(rows){
  if(!rows||rows.length===0){alert('YNCC 항차를 찾지 못했어요.');return;}
  var old=DOC&&DOC.rows?DOC.rows:[];
  rows.forEach(function(nr){
    var prev=old.find(function(o){return o.vessel===nr.vessel;});
    if(prev){nr.remark=prev.remark;nr.anal=prev.anal;nr.cert=prev.cert;
             nr.tank1=prev.tank1||'';nr.tank2=prev.tank2||'';nr.tank3=prev.tank3||'';}
  });
  rows.sort(function(a,b){
    var va=parseBerth(a.berth),vb=parseBerth(b.berth);
    if(va!==null&&vb!==null)return va-vb;
    if(va!==null)return -1; if(vb!==null)return 1; return 0;
  });
  DOC={title:todayTitle(),rows:rows,note:(DOC&&DOC.note)||''};
  renderDoc();
  alert('✓ YNCC 항차 '+rows.length+'건을 추출했어요');
}

function parsePaste(){
  var txt=document.getElementById('pasteArea').value;
  if(!txt.trim()){alert('내용을 붙여넣어 주세요');return;}
  applyRows(extractFromGrid(txt.split(/\r?\n/).map(function(l){return l.split('\t');})));
}

// ── 화면용 표 ──
function renderDoc(){
  if(!DOC)return;
  document.getElementById('resultCard').style.display='block';
  document.getElementById('docTitle').value=DOC.title;
  document.getElementById('noteArea').value=DOC.note||'';

  var h='<table class="berth"><colgroup>';
  var W=['3%','6%','13%','7%','7%','7%','11%','4%','5%','4%','7%','7%','7%','7%','4%','4%'];
  W.forEach(function(w){ h+='<col style="width:'+w+'">'; });
  h+='</colgroup><thead><tr>';
  h+='<th>순번</th><th>회사명</th><th>VESSEL NAME</th>';
  h+='<th class="nowrap">입항예정</th><th class="nowrap">접안예정</th><th class="nowrap">이안예정</th>';
  h+='<th>CARGO</th><th class="nowrap">검정</th><th class="nowrap">행선지</th><th class="nowrap">공장</th>';
  h+='<th>REMARK</th><th>TANK</th><th>TANK</th><th>TANK</th>';
  h+='<th>분석<br>완료</th><th>성적서<br>발행</th>';
  h+='</tr></thead><tbody>';
  DOC.rows.forEach(function(r,i){
    var compDisp=esc(r.comp).replace(/\(/,'<br>(');
    var cargoDisp=esc(r.cargo).replace(/\(/g,'<wbr>(');
    h+='<tr>';
    h+='<td>'+(i+1)+'</td>';
    h+='<td class="comp">'+compDisp+'</td>';
    h+='<td>'+esc(r.vessel)+'</td>';
    h+='<td class="nowrap">'+esc(r.eta)+'</td><td class="nowrap">'+esc(r.berth)+'</td><td class="nowrap">'+esc(r.etd)+'</td>';
    h+='<td class="cargo-cell">'+cargoDisp+'</td><td class="nowrap">'+esc(r.insp)+'</td>';
    h+='<td class="nowrap">'+esc(r.dest)+'</td><td class="nowrap">'+esc(r.plant)+'</td>';
    h+='<td><input class="cell" value="'+esc(r.remark)+'" onchange="setField('+i+',\'remark\',this.value)"></td>';
    h+='<td><input class="cell" value="'+esc(r.tank1||'')+'" onchange="setField('+i+',\'tank1\',this.value)"></td>';
    h+='<td><input class="cell" value="'+esc(r.tank2||'')+'" onchange="setField('+i+',\'tank2\',this.value)"></td>';
    h+='<td><input class="cell" value="'+esc(r.tank3||'')+'" onchange="setField('+i+',\'tank3\',this.value)"></td>';
    h+='<td class="ok-cell" onclick="toggleOk('+i+',\'anal\')">'+(r.anal||'')+'</td>';
    h+='<td class="ok-cell" onclick="toggleOk('+i+',\'cert\')">'+(r.cert||'')+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('tableWrap').innerHTML=h;
}

function setField(i,k,v){DOC.rows[i][k]=v;saveDoc();}
function toggleOk(i,k){DOC.rows[i][k]=DOC.rows[i][k]==='OK'?'':'OK';saveDoc();renderDoc();}

// ── 인쇄 전용 표 생성 (px 고정 + 셀 직접지정 — table-layout:fixed 확실 적용) ──
function doPrint(){
  if(!DOC)return;
  saveDoc();
  // A4 가로 인쇄영역(281mm≈1062px)보다 살짝 작게 잡아 브라우저 스케일업 방지.
  // 스케일업이 일어나면 칸 비율이 틀어지므로 1056px로 고정.
  // 각 셀(th/td)에도 직접 width+max-width를 박아 colgroup 미적용 브라우저에서도 고정.
  var PW=[31,57,135,68,68,68,115,43,53,43,74,70,70,70,43,51];
  var TOTAL_W=PW.reduce(function(a,b){return a+b;},0); // 1059px
  var HD=['순번','회사명','VESSEL NAME','입항예정','접안예정','이안예정','CARGO','검정','행선지','공장','REMARK','TANK','TANK','TANK','분석<br>완료','성적서<br>발행'];
  var nowrapCols=[3,4,5,7,8,9];

  var h='<div style="text-align:center;font-size:16px;font-weight:700;margin-bottom:8px;width:'+TOTAL_W+'px;">'+esc(DOC.title)+'</div>';
  // table 너비 px 고정 + table-layout:fixed
  h+='<table style="border-collapse:collapse;table-layout:fixed;font-family:inherit;width:'+TOTAL_W+'px;min-width:'+TOTAL_W+'px;max-width:'+TOTAL_W+'px;">';
  // colgroup px 고정 (1차 너비 결정)
  h+='<colgroup>';
  PW.forEach(function(w){ h+='<col style="width:'+w+'px">'; });
  h+='</colgroup>';
  // 헤더 — 각 th에 직접 width+max-width (2차 강제 고정)
  h+='<thead><tr>';
  function cellW(w){ return 'width:'+w+'px;min-width:'+w+'px;max-width:'+w+'px;'; }
  HD.forEach(function(t,idx){
    if(idx===11){
      // TANK 헤더만 시각적 병합 (너비는 3칸 합)
      var tankW=PW[11]+PW[12]+PW[13];
      h+='<th colspan="3" style="border:1px solid #444;padding:6px 2px;font-size:11px;background:#eaf0f6;'+
         cellW(tankW)+'height:40px;vertical-align:middle;white-space:normal;word-break:keep-all;overflow:hidden;">TANK</th>';
    } else if(idx===12||idx===13){
      // 병합으로 건너뜀
    } else {
      var nw=nowrapCols.indexOf(idx)!==-1;
      h+='<th style="border:1px solid #444;padding:6px 2px;font-size:11px;background:#eaf0f6;'+
         cellW(PW[idx])+'height:40px;vertical-align:middle;overflow:hidden;'+
         (nw?'white-space:nowrap;':'white-space:normal;word-break:keep-all;')+'">'+t+'</th>';
    }
  });
  h+='</tr></thead><tbody>';
  // 데이터 — 각 td에도 직접 width+max-width
  DOC.rows.forEach(function(r,i){
    var cells=[
      String(i+1),
      esc(r.comp).replace(/\(/,'<br>('),
      esc(r.vessel),
      esc(r.eta), esc(r.berth), esc(r.etd),
      esc(r.cargo).replace(/\(/g,'<wbr>('),
      esc(r.insp), esc(r.dest), esc(r.plant),
      esc(r.remark),
      esc(r.tank1||''), esc(r.tank2||''), esc(r.tank3||''),
      esc(r.anal||''), esc(r.cert||'')
    ];
    h+='<tr>';
    cells.forEach(function(c,idx){
      var isComp=(idx===1);
      var isOk=(idx===14||idx===15);
      var nw=nowrapCols.indexOf(idx)!==-1;
      h+='<td style="border:1px solid #444;padding:6px 2px;font-size:12px;text-align:center;'+
         cellW(PW[idx])+'height:40px;vertical-align:middle;overflow:hidden;'+
         (nw?'white-space:nowrap;':'white-space:normal;word-break:keep-all;')+
         (isComp?'background:#1a2c47;color:#fff;font-weight:700;font-size:10px;':'')+
         (isOk?'color:#1e8449;font-weight:700;':'')+'">'+c+'</td>';
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  h+='<div style="font-size:12px;font-weight:700;margin-top:8px;">*특이사항</div>';
  h+='<div style="font-size:11px;white-space:pre-wrap;min-height:24px;width:'+TOTAL_W+'px;">'+esc(DOC.note||'')+'</div>';

  document.getElementById('printArea').innerHTML=h;
  window.print();
}

DOC=loadDoc();
if(DOC)renderDoc();
</script>
</body>
</html>
