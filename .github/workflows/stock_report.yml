name: 주식 리포트 자동 실행

on:
  schedule:
    # GitHub Actions 는 UTC 기준이므로 한국시간(KST) -9시간 변환:
    # 06:00 KST = 21:00 UTC (전날), 15:30 KST = 06:30 UTC, 20:00 KST = 11:00 UTC
    - cron: '0 21 * * *'   # 06:00 KST
    - cron: '30 6 * * *'   # 15:30 KST
    - cron: '0 11 * * *'   # 20:00 KST
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write           # latest.json 을 저장소에 커밋하기 위한 권한

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 리포트 실행
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NEWSAPI_KEY:         ${{ secrets.NEWSAPI_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO:             ${{ secrets.MAIL_TO }}
        run: python main.py

      - name: latest.json 저장소에 커밋
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add latest.json
          if git diff --staged --quiet; then
            echo "변경 사항 없음"
          else
            git commit -m "Update latest.json [skip ci]"
            git push
          fi
