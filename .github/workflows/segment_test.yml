name: DART 부문정보 테스트

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  segment-test:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: pip install requests

      - name: 부문정보 추출 테스트
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python dart_segment_test.py
