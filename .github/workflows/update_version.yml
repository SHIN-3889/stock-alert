name: index.html 버전 자동 업데이트

on:
  push:
    paths:
      - 'index.html'
    branches:
      - main

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 최신 상태 동기화
        run: git pull origin main

      - name: 날짜 + 정수 버전 업데이트
        run: |
          DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M')

          CURRENT=$(grep -o "DASHBOARD_VERSION = 'v[^']*'" index.html | grep -o "v[0-9]*\.[0-9]*" | head -1)
          echo "현재 버전: $CURRENT"

          MAJOR=$(echo $CURRENT | tr -d 'v' | cut -d'.' -f1)
          if [ -z "$MAJOR" ]; then MAJOR=1; fi
          NEW_MAJOR=$((MAJOR + 1))
          NEW_VERSION="v${NEW_MAJOR}.0"

          echo "날짜: $DATE / 버전: $CURRENT → $NEW_VERSION"

          sed -i "s/const DASHBOARD_DATE    = '[^']*';/const DASHBOARD_DATE    = '$DATE';/" index.html
          sed -i "s/const DASHBOARD_VERSION = '[^']*';/const DASHBOARD_VERSION = '$NEW_VERSION';/" index.html

          echo "교체 결과:"
          grep "DASHBOARD_DATE\|DASHBOARD_VERSION" index.html

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "변경사항 없음 - 커밋 스킵"
          else
            git commit -m "auto: index.html 버전 업데이트 [skip ci]"
            git push origin main
          fi
