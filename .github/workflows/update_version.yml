name: index.html 버전 자동 업데이트

on:
  push:
    paths:
      - 'index.html'
    branches:
      - main

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 최신 상태 동기화
        run: git pull origin main

      - name: 버전 파일 읽기 및 업데이트
        run: |
          DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M')

          # version.txt에서 현재 버전 읽기 (없으면 1.0 시작)
          if [ -f version.txt ]; then
            CURRENT=$(cat version.txt)
          else
            CURRENT="1.0"
          fi
          echo "현재 버전: v$CURRENT"

          MAJOR=$(echo $CURRENT | cut -d'.' -f1)
          NEW_MAJOR=$((MAJOR + 1))
          NEW_VERSION="${NEW_MAJOR}.0"

          echo "새 버전: v$NEW_VERSION"

          # version.txt 업데이트
          echo $NEW_VERSION > version.txt

          # index.html 업데이트
          sed -i "s/const DASHBOARD_DATE    = '[^']*';/const DASHBOARD_DATE    = '$DATE';/" index.html
          sed -i "s/const DASHBOARD_VERSION = '[^']*';/const DASHBOARD_VERSION = 'v$NEW_VERSION';/" index.html

          echo "교체 결과:"
          grep "DASHBOARD_DATE\|DASHBOARD_VERSION" index.html

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html version.txt
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "auto: index.html 버전 업데이트 [skip ci]"
            git push origin main
          fi
