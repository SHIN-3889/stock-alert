name: 기타 파일 버전 자동 업데이트

on:
  push:
    paths-ignore:
      - 'index.html'
      - '.github/**'
      - '*.json'

jobs:
  update-version-minor:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 날짜 + 소수점 버전 업데이트
        run: |
          DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M')

          # 현재 버전 읽기 (예: v2.1 → major=2, minor=1)
          CURRENT=$(grep "DASHBOARD_VERSION" index.html | grep -o "v[0-9]*\.[0-9]*" | head -1)
          MAJOR=$(echo $CURRENT | grep -o "^v[0-9]*" | tr -d 'v')
          MINOR=$(echo $CURRENT | grep -o "\.[0-9]*$" | tr -d '.')
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="v${MAJOR}.${NEW_MINOR}"

          echo "날짜: $DATE / 버전: $CURRENT → $NEW_VERSION"

          sed -i "s/const DASHBOARD_DATE    = '[^']*';/const DASHBOARD_DATE    = '$DATE';/" index.html
          sed -i "s/const DASHBOARD_VERSION = '[^']*';/const DASHBOARD_VERSION = '$NEW_VERSION';/" index.html

          echo "교체 결과:"
          grep "DASHBOARD_DATE\|DASHBOARD_VERSION" index.html

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "auto: 버전 업데이트 (기타 파일 수정)"
          git push
